<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XBWorld</title>
  <meta name="description" content="XBWorld is an AI-powered civilization strategy game inspired by the history of human civilization.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, minimal-ui">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="shortcut icon" href="/images/xbworld-favicon.svg">
  <link rel="apple-touch-icon" href="/images/xbworld-logo.svg">

  <!-- Legacy CSS bundle -->
  <link rel="stylesheet" href="/css/webclient.min.css">
  <!-- font-awesome.min.css removed: replaced icons with emoji (31 KB CSS + 77 KB font saved) -->
  <!-- TS bundle CSS -->
  <link rel="stylesheet" href="/javascript/ts-bundle/xbworld-web.css">
</head>

<body>

<!-- Pregame -->
<div id="pregame_page">
  <div id="pregame_options">
    <div id="pregame_buttons">
      <div id="xbworld_logo" style="cursor:pointer"></div>
    </div>
  </div>
  <div id="pregame_player_list"></div>
  <div id="pregame_game_info"></div>
  <ol id="pregame_message_area"></ol>
  <div id="pregame_chat_box">
    <span style="color: white; font-size: 160%;">💬</span>
    <input id="pregame_text_input" type="text" name="text_input" value=">" />
  </div>
</div>

<!-- Game Page -->
<div id="game_page" style="display: none;">
  <div id="tabs">
    <ul id="tabs_menu">
      <div id="xbworld_logo_tabs"></div>
      <li id="map_tab"><a href="#tabs-map" title="Map">🌍 Map</a></li>
      <li id="civ_tab"><a href="#tabs-civ" title="Government">🏛 Government</a></li>
      <li id="tech_tab"><a id="tech_tab_item" href="#tabs-tec" title="Research">🧪 Research</a></li>
      <li id="players_tab"><a href="#tabs-nat" title="Nations">🏴 Nations</a></li>
      <li id="cities_tab"><a href="#tabs-cities" title="Cities">🏰 Cities</a></li>
      <li id="opt_tab"><a href="#tabs-opt" title="Options">⚙️ Options</a></li>
      <li id="hel_tab"><a href="#tabs-hel" title="Manual">❓ Manual</a></li>
      <div id="game_status_panel_top"></div>
      <!-- turn_done removed: observer-only mode -->
    </ul>

    <div id="tabs-map" tabindex="-1">
      <div id="mapview_canvas_div">
        <div id="canvas_div"></div>
        <div id="game_chatbox_panel">
          <div id="xbworld_custom_scrollbar_div">
            <div id="freeciv_custom_scrollbar_div">
              <ol id="game_message_area"></ol>
            </div>
          </div>
          <div id="game_chat_box">
            <input id="game_text_input" type="text" name="text_input" placeholder="Chat..." />
          </div>
        </div>
        <div id="game_status_panel_bottom"></div>

        <!-- game_unit_orders_default removed: observer-only mode -->

        <div id="game_overview_panel">
          <div id="overview_map">
            <canvas id="overview_img" width="200" height="100"></canvas>
            <canvas id="overview_viewrect" width="200" height="100"></canvas>
          </div>
        </div>
        <div id="game_unit_panel">
          <div id="game_unit_info">&nbsp;</div>
        </div>
      </div>
    </div>

    <div id="tabs-civ">
      <div id="civ_dialog">
        <h2 id="nation_title">Your Nation</h2>
        <div id="civ_dialog_text"></div>
        <!-- revolution_button and taxrates_button removed: observer-only mode -->
        <button id="wonders_report" type="button">Wonders of the World</button>
        <button id="demography_report" type="button">Demographics</button>
      </div>
    </div>

    <div id="tabs-tec">
      <div id="technology_dialog">
        <div id="tech_info_box">
          <div id="tech_goal_box"></div>
          <div id="tech_progress_box">
            <div id="progress_bg"><div id="progress_fg">&nbsp;</div><span id="tech_progress_text"></span></div>
            <div><span id="bulbs_output"></span></div>
          </div>
          <div id="tech_results"><span id="tech_result_text"></span></div>
        </div>
        <div id="technologies"><canvas id="tech_canvas"></canvas></div>
      </div>
    </div>

    <div id="tabs-nat">
      <div id="nations_title"></div>
      <div id="nations_button_div">
        <button id="view_player_button" type="button">View on Map</button>
        <button id="meet_player_button" type="button">Meet Player</button>
        <button id="game_scores_button" type="button">Game Scores</button>
      </div>
      <div id="nations"><div id="nations_list"></div></div>
    </div>

    <div id="tabs-cities">
      <h2>Your Cities</h2>
      <div id="cities_scroll"><div id="cities"><div id="cities_list"></div></div></div>
    </div>

    <div id="tabs-hel" class="manual_doc"></div>

    <div id="tabs-opt">
      <div style="text-align: center;">
        <h2>Game Options</h2>
        <div class="main_menu_buttons"><b>Music:</b><br><audio preload="none"></audio></div>
        <table>
          <tr><td><button id="save_button" type="button">Save Game</button></td>
              <td><button id="fullscreen_button" type="button">Fullscreen</button></td></tr>
          <tr><td><button id="surrender_button" type="button">Surrender</button></td>
              <td><button id="end_button" type="button">End Game</button></td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

     Third-party libraries
     ============================================================ -->

<script src="/javascript/libs/jquery.min.js"></script>
<script src="/javascript/libs/jquery-ui.min.js"></script>
<!-- jQuery plugins -->
<!-- jquery.blockUI.js removed: replaced by vanilla blockUI in utils/dom.ts -->
<script src="/javascript/libs/jquery.contextMenu.js"></script>
<!-- jquery.dialogextend.js removed: zero references in codebase -->

<script src="/javascript/libs/jquery.tablesorter.min.js"></script>

<!-- Stubs for optional dependencies not deployed -->
<script>
if (typeof audiojs === "undefined") {
  window.audiojs = {
    events: { ready: function(fn) { /* no-op: music not deployed */ } },
    createAll: function() { return [null]; }
  };
}
var ts = Date.now();
</script>

<!-- P0 fix: $.getUrlVar must be registered synchronously before $(document).ready fires.
     Originally injected by ts-bundle/main.js via jQuery.extend(), but <script type="module">
     is deferred (runs after DOMContentLoaded), which is too late for civclient_init.
     This block duplicates the registration here so legacy JS can call $.getUrlVar safely.
     The ts-bundle registration is kept as well (idempotent — jQuery.extend overwrites with
     the same implementation), so there is no double-registration issue. -->
<script>
(function () {
  function _getUrlVars() {
    var vars = [];
    var href = window.location.href;
    var idx = href.indexOf('?');
    if (idx === -1) return vars;
    var hashes = href.slice(idx + 1).split('&');
    for (var i = 0; i < hashes.length; i++) {
      var pair = hashes[i].split('=');
      vars.push(pair[0]);
      vars['var-' + pair[0]] = pair[1];
    }
    return vars;
  }
  if (window.jQuery) {
    jQuery.extend({
      getUrlVars: _getUrlVars,
      getUrlVar: function (name) { return _getUrlVars()['var-' + name]; }
    });
  }
})();
</script>

<!-- ============================================================
     TypeScript bundle — all game client code
     ============================================================ -->
<script type="module" src="/javascript/ts-bundle/main.js"></script>

</body>
</html>
