server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Required for proxy_pass with HTTPS upstream variables at request time
    resolver 8.8.8.8 valid=30s;
    resolver_timeout 5s;
    set $backend "${BACKEND_URL}";

    # --- Static files (frontend) ---

    location /webclient/ {
        alias /usr/share/nginx/html/webclient/;
        try_files $uri $uri/ /webclient/index.html;
    }

    location /javascript/ {
        alias /usr/share/nginx/html/javascript/;
        expires 1h;
    }

    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 1h;
    }

    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 1d;
    }

    location /tileset/ {
        alias /usr/share/nginx/html/tileset/;
        expires 1d;
    }

    location /textures/ {
        alias /usr/share/nginx/html/textures/;
        expires 1d;
    }

    location /fonts/ {
        alias /usr/share/nginx/html/fonts/;
        expires 1d;
    }

    location /music/ {
        alias /usr/share/nginx/html/music/;
        expires 1d;
    }

    # --- Reverse proxy to backend ---

    # WebSocket proxy for game connections
    location /civsocket/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API endpoints → backend
    location /meta/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /game/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /servers {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /motd.js {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /observer {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /civclientlauncher {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default: try static files first
    location / {
        try_files $uri $uri/ =404;
    }
}
