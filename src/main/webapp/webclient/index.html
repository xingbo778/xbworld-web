<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XBWorld</title>
  <meta name="description" content="XBWorld is an AI-powered civilization strategy game inspired by the history of human civilization.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, minimal-ui">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="shortcut icon" href="/src/main/webapp/images/xbworld-favicon.svg">
  <link rel="apple-touch-icon" href="/src/main/webapp/images/xbworld-logo.svg">
  <link rel="manifest" href="/static/manifest.json">

  <link rel="stylesheet" href="/src/main/webapp/css/font-awesome.min.css">
  <link rel="stylesheet" href="/src/main/webapp/css/xbworld.css">
</head>

<body>

<!-- Pregame -->
<div id="pregame_page">
  <div id="pregame_options">
    <div id="pregame_buttons">
      <div id="xbworld_logo" style="cursor:pointer"></div>
      <button id="start_game_button" type="button" class="xb-btn xb-btn-primary"><i class="fa fa-check-circle-o"></i> <b>Start Game</b></button>
      <button id="load_game_button" type="button" class="xb-btn"><i class="fa fa-file-o"></i> Load Game</button>
      <button id="pick_nation_button" type="button" class="xb-btn"><i class="fa fa-flag"></i> Pick Nation</button>
      <button id="pregame_settings_button" type="button" class="xb-btn"><i class="fa fa-cogs"></i> Game Settings</button>
    </div>
  </div>
  <div id="pregame_player_list"></div>
  <div id="pregame_game_info"></div>
  <ol id="pregame_message_area"></ol>
  <div id="pregame_chat_box">
    <i class="fa fa-commenting-o fa-2" style="color: white; font-size: 160%;"></i>
    <input id="pregame_text_input" type="text" name="text_input" value=">" />
  </div>
</div>
<div id="pick_nation_dialog"></div>

<!-- Game Page -->
<div id="game_page" style="display: none;">
  <div id="tabs">
    <ul id="tabs_menu">
      <div id="xbworld_logo_tabs"></div>
      <li id="map_tab" class="ui-state-active"><a href="#tabs-map" title="Map"><i class="fa fa-globe"></i> <span class="tab-label" data-i18n="tab_map">Map</span></a></li>
      <li id="civ_tab"><a href="#tabs-civ" title="Government"><i class="fa fa-university"></i> <span class="tab-label" data-i18n="tab_gov">Government</span></a></li>
      <li id="tech_tab"><a id="tech_tab_item" href="#tabs-tec" title="Research"><i class="fa fa-flask"></i> <span class="tab-label" data-i18n="tab_research">Research</span></a></li>
      <li id="players_tab"><a href="#tabs-nat" title="Nations"><i class="fa fa-flag"></i> <span class="tab-label" data-i18n="tab_nations">Nations</span></a></li>
      <li id="cities_tab"><a href="#tabs-cities" title="Cities"><i class="fa fa-fort-awesome"></i> <span class="tab-label" data-i18n="tab_cities">Cities</span></a></li>
      <li id="opt_tab"><a href="#tabs-opt" title="Options"><i class="fa fa-cogs"></i> <span class="tab-label" data-i18n="tab_options">Options</span></a></li>
      <li id="hel_tab"><a href="#tabs-hel" title="Manual"><i class="fa fa-question-circle-o"></i> <span class="tab-label" data-i18n="tab_manual">Manual</span></a></li>
      <li id="lang_toggle" class="lang-toggle-li"><a href="javascript:void(0)" id="lang_toggle_btn" title="中文/EN"><i class="fa fa-language"></i></a></li>
      <div id="game_status_panel_top"></div>
      <div id="turn_done_button_div">
        <button id="turn_done_button" type="button" class="xb-btn xb-btn-primary" title="Ends your turn. (Shift+Enter)" data-i18n="btn_turn_done">Turn Done</button>
      </div>
    </ul>

    <div id="tabs-map" tabindex="-1">
      <div id="mapview_canvas_div">
        <div id="canvas_div"></div>
        <div id="game_chatbox_panel">
          <div id="xbworld_custom_scrollbar_div">
            <ol id="game_message_area"></ol>
          </div>
          <div id="game_chat_box">
            <input id="game_text_input" type="text" name="text_input" placeholder="Chat..." />
          </div>
        </div>
        <div id="game_status_panel_bottom"></div>

        <div id="game_unit_orders_default">
          <button id="order_goto" class="order_button" title="Go to tile (G)"><img src="/images/orders/goto_default.png" alt="Goto" width="30" height="30"></button>
          <button id="order_explore" class="order_button" title="Auto explore (X)"><img src="/images/orders/auto_explore_default.png" alt="Explore" width="30" height="30"></button>
          <button id="order_fortify" class="order_button" title="Fortify (F)"><img src="/images/orders/fortify_default.png" alt="Fortify" width="30" height="30"></button>
          <button id="order_build_city" class="order_button" title="Build city (B)"><img src="/images/orders/build_city_default.png" alt="Build" width="30" height="30"></button>
          <button id="order_road" class="order_button" title="Build road (R)"><img src="/images/orders/road_default.png" alt="Road" width="30" height="30"></button>
          <button id="order_irrigate" class="order_button" title="Irrigate (I)"><img src="/images/orders/irrigate_default.png" alt="Irrigate" width="30" height="30"></button>
          <button id="order_mine" class="order_button" title="Mine (M)"><img src="/images/orders/mine_default.png" alt="Mine" width="30" height="30"></button>
          <button id="order_sentry" class="order_button" title="Sentry (S)"><img src="/images/orders/sentry_default.png" alt="Sentry" width="30" height="30"></button>
          <button id="order_auto_workers" class="order_button" title="Auto workers (A)"><img src="/images/orders/auto_workers_default.png" alt="Auto" width="30" height="30"></button>
          <button id="order_pillage" class="order_button" title="Pillage (Shift-P)"><img src="/images/orders/pillage.png" alt="Pillage" width="30" height="30"></button>
          <button id="order_disband" class="order_button" title="Disband"><img src="/images/orders/disband_default.png" alt="Disband" width="30" height="30"></button>
        </div>

        <div id="game_overview_panel">
          <div id="overview_map">
            <canvas id="overview_canvas" width="200" height="100"></canvas>
          </div>
        </div>
        <div id="game_unit_panel">
          <div id="game_unit_info">&nbsp;</div>
        </div>
      </div>
    </div>

    <div id="tabs-civ">
      <div id="civ_dialog">
        <h2 id="nation_title">Your Nation</h2>
        <div id="civ_dialog_text"></div>
        <button id="revolution_button" class="xb-btn" type="button">Revolution</button>
        <button id="taxrates_button" class="xb-btn" type="button">Tax Rates</button>
        <button id="wonders_report" class="xb-btn" type="button">Wonders of the World</button>
        <button id="demography_report" class="xb-btn" type="button">Demographics</button>
      </div>
    </div>

    <div id="tabs-tec">
      <div id="technology_dialog">
        <div id="tech_info_box">
          <div id="tech_goal_box"></div>
          <div id="tech_progress_box">
            <div id="progress_bg"><div id="progress_fg">&nbsp;</div><span id="tech_progress_text"></span></div>
            <div><span id="bulbs_output"></span></div>
          </div>
          <div id="tech_results"><span id="tech_result_text"></span></div>
        </div>
        <div id="technologies"><canvas id="tech_canvas"></canvas></div>
      </div>
    </div>

    <div id="tabs-nat">
      <div id="nations_title"></div>
      <div id="nations_button_div">
        <button id="view_player_button" type="button" class="xb-btn">View on Map</button>
        <button id="meet_player_button" type="button" class="xb-btn">Meet Player</button>
        <button id="game_scores_button" type="button" class="xb-btn">Game Scores</button>
      </div>
      <div id="nations"><div id="nations_list"></div></div>
    </div>

    <div id="tabs-cities">
      <h2>Your Cities</h2>
      <div id="cities_scroll"><div id="cities"><div id="cities_list"></div></div></div>
    </div>

    <div id="tabs-hel" class="manual_doc"></div>

    <div id="tabs-opt">
      <div style="text-align: center;">
        <h2>Game Options</h2>
        <div class="main_menu_buttons"><b>Music:</b><br><audio preload="none"></audio></div>
        <table>
          <tr><td><button id="save_button" type="button" class="xb-btn" title="Save game (Ctrl+S)">Save Game</button></td>
              <td><button id="fullscreen_button" type="button" class="xb-btn">Fullscreen</button></td></tr>
          <tr><td><button id="surrender_button" type="button" class="xb-btn">Surrender</button></td>
              <td><button id="end_button" type="button" class="xb-btn">End Game</button></td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var FC_I18N = {
  _lang: (navigator.language || '').startsWith('zh') ? 'zh' : 'en',
  _dict: {
    zh: { tab_map: '地图', tab_gov: '政府', tab_research: '科研', tab_nations: '国家', tab_cities: '城市', tab_options: '选项', tab_manual: '手册', btn_turn_done: '结束回合' },
    en: { tab_map: 'Map', tab_gov: 'Government', tab_research: 'Research', tab_nations: 'Nations', tab_cities: 'Cities', tab_options: 'Options', tab_manual: 'Manual', btn_turn_done: 'Turn Done' }
  },
  tr: function(key) { return (this._dict[this._lang] || this._dict['en'])[key] || key; },
  setLang: function(lang) {
    this._lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el) { el.textContent = FC_I18N.tr(el.getAttribute('data-i18n')); });
  }
};
document.getElementById('lang_toggle_btn')?.addEventListener('click', function() {
  FC_I18N.setLang(FC_I18N._lang === 'zh' ? 'en' : 'zh');
});
if (FC_I18N._lang === 'zh') document.addEventListener('DOMContentLoaded', function() { FC_I18N.setLang('zh'); });
</script>

<script type="module" src="/src/ts/main.ts"></script>

</body>
</html>
