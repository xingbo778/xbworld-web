name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start mock backend
        run: MOCK_PORT=8002 node mock-backend.mjs &

      - name: Wait for mock backend
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8002/ && break
            echo "Waiting for mock backend... ($i)"
            sleep 1
          done

      - name: Run E2E tests
        run: npx playwright test --config playwright.ci.config.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload failure screenshots / videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 3
