server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Required for proxy_pass with HTTPS upstream variables at request time
    resolver 8.8.8.8 valid=30s;
    resolver_timeout 5s;
    set $backend "${BACKEND_URL}";
    set $agent "${AGENT_URL}";

    # --- Static files (frontend) ---

    location /webclient/ {
        alias /usr/share/nginx/html/webclient/;
        try_files $uri $uri/ /webclient/index.html;
    }

    location /javascript/ {
        alias /usr/share/nginx/html/javascript/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Tileset spec JSON is static per-deploy — cache immutably
    location ~* ^/javascript/2dcanvas/tileset_spec_amplio2\.json$ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location /images/ {
        alias /usr/share/nginx/html/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /tileset/ {
        alias /usr/share/nginx/html/tileset/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /textures/ {
        alias /usr/share/nginx/html/textures/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /fonts/ {
        alias /usr/share/nginx/html/fonts/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /music/ {
        alias /usr/share/nginx/html/music/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # --- Reverse proxy to backend ---

    # WebSocket proxy for game connections
    location /civsocket/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API endpoints → backend
    location /meta/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /game/ {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /servers {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /motd.js {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /observer {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /civclientlauncher {
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin API → xbworld-agent
    location /admin/ {
        proxy_pass $agent;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Default: try static files first
    location / {
        try_files $uri $uri/ =404;
    }
}
